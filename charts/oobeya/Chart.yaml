apiVersion: v2
name: oobeya
description: "Oobeya: Engineering Intelligence Platform. Engineering metrics, DORA, and DevOps insights."
type: application

version: 1.0.4

appVersion: "Latest"

kubeVersion: ">=1.27.0-0"

keywords:
  - oobeya
  - devops
  - microservices
  - engineering-intelligence
  - dora-metrics
  - software-delivery

annotations:
  artifacthub.io/install: |
    helm repo add oobeya https://oobeyaio.github.io/oobeya-helm-chart/
    
    helm install oobeya oobeya/oobeya -f my-values.yaml

sources:
  - https://github.com/oobeyaio/oobeya-helm-chart
  - https://docs.oobeya.io

icon: https://raw.githubusercontent.com/oobeyaio/oobeya-helm-chart/main/oobeya-logo.svg

home: https://oobeya.io
