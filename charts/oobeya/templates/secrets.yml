---

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oobeyaRabbitmq.secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaRabbitmq.labels.app }}
type: Opaque
stringData:
  {{- if .Values.oobeyaExternalRabbitmq.isExternal }}
  RABBITMQ_HOST: {{ .Values.oobeyaExternalRabbitmq.external.host | quote }}
  RABBITMQ_PORT: {{ .Values.oobeyaExternalRabbitmq.external.port | quote }}
  RABBITMQ_USERNAME: {{ .Values.oobeyaExternalRabbitmq.external.user | quote }}
  RABBITMQ_PASSWORD: {{ .Values.oobeyaExternalRabbitmq.external.pass | quote }}
  SPRING_RABBITMQ_VIRTUAL_HOST: {{ .Values.oobeyaExternalRabbitmq.external.vhost | quote }}
  SPRING_RABBITMQ_SSL_ENABLED: {{ .Values.oobeyaExternalRabbitmq.external.ssl | quote }}
  SPRING_RABBITMQ_SSL_VALIDATE_SERVER_CERTIFICATE: {{ .Values.oobeyaExternalRabbitmq.external.sslVerify | quote }}
  {{- else }}
  RABBITMQ_HOST: {{ .Values.oobeyaExternalRabbitmq.internal.host | quote }}
  RABBITMQ_DEFAULT_USER: {{ .Values.oobeyaExternalRabbitmq.internal.user | quote }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.oobeyaExternalRabbitmq.internal.pass | quote }}
  {{- end }}
