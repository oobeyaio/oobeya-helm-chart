{{- $mongo := .Values.oobeyaExternalMongo -}}
{{- $ns := .Values.namespace -}}

{{- if not $mongo.isExternal }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oobeyaMongo.secretName }}
  namespace: {{ $ns }}
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "oobeya"
  MONGO_INITDB_ROOT_PASSWORD: "mEQ9DwcmZSO8aXv9"
{{- end }}

---

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.oobeyaGateway.secretName }}
  namespace: {{ $ns }}
type: Opaque
stringData:
  {{- if $mongo.isExternal }}
  OOBEYA_GATEWAY_MONGODB_URI: "mongodb://{{ $mongo.user }}:{{ $mongo.pass }}@{{ $mongo.host }}:{{ $mongo.port }}/{{ $mongo.databases.gateway }}?authSource={{ $mongo.authSource }}"
  OOBEYA_GATEWAY_MONGODB_DB: {{ $mongo.databases.gateway | quote }}
  {{- else }}
  OOBEYA_GATEWAY_MONGODB_URI: "mongodb://oobeya:mEQ9DwcmZSO8aXv9@oobeya-mongo:27017/gatewayDB?authSource=admin"
  OOBEYA_GATEWAY_MONGODB_DB: "gatewayDB"
  {{- end }}

