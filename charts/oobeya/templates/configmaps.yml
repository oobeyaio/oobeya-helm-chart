apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaDashboard.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaDashboard.labels.app }}
data:
  PLATFORM_API_PORT: "8080"
  PLATFORM_MANAGEMENT_PORT: "58080"
  UAA_HOST: "oobeya-uaa"
  UAA_CLIENT_ID: "oobeyaTrustedClient"
  UAA_CLIENT_SECRET: "oobeyaClientSecret"
  PLATFORM_COMPANY_NAME: "Oobeya"
  PLATFORM_COMPANY_CLASSNAME: "oobeya"
  PLATFORM_COMPANY_LOGO: "assets/images/testinium.svg"
  EUREKA_ENABLED: "false"
  RABBITMQ_HOST: "oobeya-rabbitmq"
  ADDON_TESTRAIL_STATUS: "false"
  ADDON_ZEPHYR_STATUS: "false"
  ADDON_TESTINIUM_STATUS: "false"
  ADDON_TESTINIUM_CLOUD_STATUS: "false"
  ADDON_ELASTIC_APM_STATUS: "false"
  ADDON_DYNATRACE_STATUS: "false"
  ADDON_APPDYNAMICS_STATUS: "false"
  ADDON_SENTRY_STATUS: "false"
  CORS_ALLOWED_ORIGIN: "{{ .Values.oobeyaDashboard.corsAllowedOrigin }}"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaGateway.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaGateway.labels.app }}
data:
  OOBEYA_GATEWAY_PORT: "8099"
  OOBEYA_GATEWAY_MANAGEMENT_PORT: "58099"
  EUREKA_ENABLED: "false"
  RABBITMQ_HOST: "oobeya-rabbitmq"
  OOBEYA_GATEWAY_LOGGING_LEVEL: "TRACE"
  GITWISER_API_PORT: "8077"
  OOBEYA_GATEWAY_BASE_URL: "{{ .Values.oobeyaGateway.corsAllowedOrigin }}"
  CORS_ALLOWED_ORIGIN: "{{ .Values.oobeyaGateway.gatewayBaseOrigin }}"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaMongo.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaMongo.labels.app }}
data:
  init-user.js: |
    db.createUser({
      user: "$MONGO_INITDB_ROOT_USERNAME",
      pwd: "$MONGO_INITDB_ROOT_PASSWORD",
      roles: [
        { role: 'root', db: 'admin' },
        { role: 'readWrite', db: 'addonsDB' },
        { role: 'readWrite', db: 'gatewayDB' },
        { role: 'readWrite', db: 'agilespaceDB' },
        { role: 'readWrite', db: 'config' },
        { role: 'readWrite', db: 'dashboardDB' },
        { role: 'readWrite', db: 'devteamDB' },
        { role: 'readWrite', db: 'gitwiserDB' },
        { role: 'readWrite', db: 'uaaDB' }
      ]
    });

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaAddons.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaAddons.labels.app }}
data:
  ADDONS_API_PORT: "8079"
  ADDONS_MANAGEMENT_PORT: "58079"
  EUREKA_ENABLED: "false"
  RABBITMQ_HOST: "oobeya-rabbitmq"
  SSL_ENABLED: {{ ternary "true" "false" .Values.customSSL.secretSSL.enabled | quote }}
  SSL_CERT_FILE_NAMES: {{ join "," .Values.customSSL.secretSSL.certFileNames | quote }}

---

apiVersion: v1
kind: ConfigMap
metadata:
