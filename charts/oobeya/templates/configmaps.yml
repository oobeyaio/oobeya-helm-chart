  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaAgilespace.labels.app }}
data:
  AGILESPACE_API_PORT: "8074"
  AGILESPACE_MANAGEMENT_PORT: "58074"
  EUREKA_ENABLED: "false"
  RABBITMQ_HOST: "oobeya-rabbitmq"
  SSL_ENABLED: {{ ternary "true" "false" .Values.customSSL.secretSSL.enabled | quote }}
  SSL_CERT_FILE_NAMES: {{ join "," .Values.customSSL.secretSSL.certFileNames | quote }}

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaDevteam.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaDevteam.labels.app }}
data:
  DEVTEAM_API_PORT: "8078"
  DEVTEAM_MANAGEMENT_PORT: "58078"
  EUREKA_ENABLED: "false"
  RABBITMQ_HOST: "oobeya-rabbitmq"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaGitwiser.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaGitwiser.labels.app }}
data:
  GITWISER_API_PORT: "8077"
  GITWISER_MANAGEMENT_PORT: "58077"
  SSL_ENABLED: {{ ternary "true" "false" .Values.customSSL.secretSSL.enabled | quote }}
