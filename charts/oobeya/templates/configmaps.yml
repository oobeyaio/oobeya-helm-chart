apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaRabbitmq.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaRabbitmq.labels.app }}
data:
  RABBITMQ_DEFAULT_USER: "admin"
  RABBITMQ_DEFAULT_PASS: "123456"
  RABBITMQ_HOST: "oobeya-rabbitmq"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.oobeyaUaa.configMapName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.oobeyaUaa.labels.app }}
data:
  UAA_API_PORT: "10000"
  UAA_MANAGEMENT_PORT: "10001"
  UAA_CLIENT_ID: "oobeyaTrustedClient"
  UAA_CLIENT_SECRET: "oobeyaClientSecret"
  SSL_ENABLED: {{ ternary "true" "false" .Values.customSSL.secretSSL.enabled | quote }}
  SSL_CERT_FILE_NAMES: {{ join "," .Values.customSSL.secretSSL.certFileNames | quote }}
  RABBITMQ_HOST: "oobeya-rabbitmq"
  EUREKA_ENABLED: "false"
  SHOW_ABLE_DASHBOARD: "false"
  SHOW_ABLE_GAMIFICATION: "false"
  SHOW_ABLE_TEAM_HEALTH: "true"
  SHOW_ABLE_GITWISER: "true"
  SHOW_ABLE_AGILESPACE: "true"
  SHOW_ABLE_GAMIFICATION_V2: "true"
  SHOW_ABLE_ALLOCATION: "true"
  SHOW_ABLE_BUG_REPORT: "true"
  SHOW_ABLE_HEATMAP: "true"
  SHOW_ABLE_GIT_COPILOT: "true"
  SHOW_ABLE_TEST_ANALYTICS: "true"

